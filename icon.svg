<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background -->
  <rect width="512" height="512" rx="110" fill="#2c3e5a"/>

  <!-- Subtle radial glow -->
  <radialGradient id="glow" cx="35%" cy="30%" r="65%">
    <stop offset="0%" stop-color="#d4891a" stop-opacity="0.25"/>
    <stop offset="100%" stop-color="#2c3e5a" stop-opacity="0"/>
  </radialGradient>
  <rect width="512" height="512" rx="110" fill="url(#glow)"/>

  <!-- C³ formula text -->
  <text x="256" y="200" text-anchor="middle"
    font-family="Georgia, serif" font-size="88" font-weight="700"
    fill="#f0b84a" letter-spacing="6">C³</text>

  <!-- Divider line -->
  <line x1="120" y1="228" x2="392" y2="228" stroke="#f0b84a" stroke-width="2" stroke-opacity="0.4"/>

  <!-- Formula line -->
  <text x="256" y="294" text-anchor="middle"
    font-family="Georgia, serif" font-size="38" font-weight="400"
    fill="#f0b84a" letter-spacing="4" font-style="italic">C : C → C</text>

  <!-- Subtitle -->
  <text x="256" y="348" text-anchor="middle"
    font-family="Arial, sans-serif" font-size="22" font-weight="600"
    fill="rgba(255,255,255,0.45)" letter-spacing="5">DECISION LAB</text>

  <!-- Three dots representing alternatives -->
  <circle cx="196" cy="402" r="10" fill="#c4603a" opacity="0.9"/>
  <circle cx="256" cy="402" r="10" fill="#d4891a" opacity="0.9"/>
  <circle cx="316" cy="402" r="10" fill="#3d5a3e" opacity="0.9"/>
</svg>
